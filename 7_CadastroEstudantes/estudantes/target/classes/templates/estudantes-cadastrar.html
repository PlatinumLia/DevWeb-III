<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
</head>
<body>
    <div class="container">
        <h1>Cadastro de estudantes</h1>

        <form th:action="@{/estudantes/salvar}" method="post" enctype="multipart/form-data" th:object="${estudantes}">
            <div class="mb-3">
                <label class="form-label">nome: </label>
                <input class="form-control" type="text" th:field="*{nome}">

                <div class="invalid-feedback" th:if="${#fields.hasErrors('nome')}">
                    <span th:erros="*{nome}" ></span>
                </div>
            </div>
            
            <div class="mb-3">
                <label class="form-label">data de ingresso: </label>
                <input class="form-control" type="date" name="dataIngresso">
            </div>
            
            <div class="mb-3">
                <label>
                    <input class="form-check-input" type="checkbox" name="habilidades" value="HTML">
                    HTML
                    
                    <input class="form-check-input" type="checkbox" name="habilidades" value="CSS">
                    CSS
                    
                    <input class="form-check-input" type="checkbox" name="habilidades" value="JavaScript">
                    JavaScript
                </label>
            </div>

            <div class="mb-3">
                <label class="form-label">avatar: </label>
                <input class="form-control" type="file" name="avatar">
            </div>

            <div class="mb-3">
                <input class="btn btn-dark" type="submit">
            </div>
        </form>
    </div>
</body>
</html>
