<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            padding: 0;
            margin: 0;
        }

        input{
            display: flex;
            margin-left: 5px;
            margin-bottom: 5px;
        }
        
        button{
            display: flex;
            margin-left: 5px;
            margin-bottom: 5px;
        }

        .card-container{
            display: inline-block;
            margin: 5px;
        }

        .card{
            font-size: 18px;
            gap: 5px;
            display: flex;
            justify-content: left;
            justify-content: left;
            align-items: center;
        }

    </style>
</head>
<body>
    <h1>Tarefas</h1>

    <div class="cadastrar">
        <form th:action="@{/add}" method="post">
            <input type="text" name="tarefa">
            <input type="date" name="Datalimite">
            <button type="submit">adicionar</button>
        </form>
    </div>

    <div class="card-container">
        <div th:each="tarefa : ${lista}" class="card">
            <ul>
                <li>
                    <span th:text="${tarefa.id}"></span> | 
                    <span th:text="${tarefa.tarefa}"></span> |
                    <span th:text="${tarefa.estado.descricao}"></span> |
                    <span th:text="${tarefa.dataLimite}"></span> |
                    <a th:href="@{editar-estado/{id} (id = $(tarefa.id) )}">alterar estado</a>
                    <a th:href="@{/excluir/{id} (id = $(tarefa.id) )}">excluir</a>
                </li>
            </ul>
        </div>
    </div>
</body>
</html>
