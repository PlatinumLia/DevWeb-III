<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Editar tarefa</title>
    <style>
        *{
            padding: 0;
            margin: 0;
        }
    </style>
</head>

<body>
    <div class="container mt-5 p-2">
        <p class="h1">Edição de tarefa</p>
        <form th:action="@{/tarefas/atualizar}" method="post">
            <input type="hidden" name="id" th:value="${id}">
    
            <div class="mb-3">
                <label class="form-label" for="">Título:</label>
                <input class="form-control" type="text" name="titulo" th:value="${tarefa.titulo}">
            </div>
    
            <div class="mb-3">
                <label class="form-label" for="">Descrição:</label>
                <input class="form-control" type="text" name="descricao" th:value="${tarefa.descricao}">
            </div>
    
            <div class="mb-3">
                <label class="form-label" for="">Data:</label>
                <input class="form-control" type="date" name="data" th:value="${tarefa.data}">
            </div>

            <div class="mb-3">
                <label class="form-label" for="">Estado:</label>
                <select class="form-select" name="estado">
                    <option th:each="e : ${estados}" th:value="${e}" th:text="${e.descricao}" th:selected="${e == tarefa.estado}">
                        <!-- Mostra os estados do enum "EstadoTarefa" na opção do select -->
                    </option>
                </select>
            </div>
    
            <div>
                <input class="btn btn-dark" type="submit" th:value="Salvar">
                <a class="btn btn-secondary" th:href="@{/tarefas}">Voltar</a>
            </div>
        </form>
    </div>
</body>
</html>
