<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Cadastro de tarefa</title>
    <style>
        *{
            padding: 0;
            margin: 0;
        }
    </style>
</head>

<body>
    <div class="container mt-3 p-2">
        <form th:action="@{/tarefas/salvar}" method="post">
            <p class="h1">Registrar tarefa</p>
            <div class="mb-3">
                <label class="form-label" for="">Título</label>
                <input class="form-control" type="text" name="titulo">
            </div>
    
            <div class="mb-3">
                <label class="form-label" for="">Data</label>
                <input class="form-control" type="date" name="data">    
            </div>

            <div class="mb-3">
                <label class="form-label" for="">Descrição</label>
                <input class="form-control" type="text" name="descricao">
            </div>
    
            <div>
                <input class="btn btn-dark" type="submit" th:value="Cadastrar">
                <a class="btn btn-secondary" th:href="@{/tarefas}">Voltar</a>
            </div>
        </form>
    </div>
</body>
</html>
