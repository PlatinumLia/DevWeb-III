<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Tarefas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
        *{
            padding: 0;
            margin: 0;
        }


    </style>
</head>

<body>
    <div class="container p-2 mt-5">
        <p class="h1">Lista de tarefas</p>
        <table class="table table-striped">
            <thead>    
                <tr>
                    <th scope="col">ID</th>
                    <th scope="col">Título</th>
                    <th scope="col">Data</th>
                    <th scope="col">Opções</th>
                </tr>
            </thead>
            
            <tbody>
                <tr th:each="t : ${tarefas}">
                    <td th:text="${t.id}">ID</td>
                    
                    <td>
                        <a class="link-warning link-offset-2 link-underline-opacity-25 link-underline-opacity-100-hover" th:text="${t.titulo}" th:href="@{/tarefas/informacoes/{id} (id=${t.id})}">Título</a>
                    </td>
                    
                    <td th:text="${t.data}">Data</td>

                    <td>
                        <a class="btn btn-primary" th:href="@{/tarefas/editar/{id}(id = ${t.id})}">Editar</a>
                        <a class="btn btn-primary" th:href="@{/tarefas/excluir/{id}(id = ${t.id})}">Excluir</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
    
    <div class="container">
        <a class="btn btn-dark" th:href="@{/tarefas/cadastrar}">Cadastrar</a>
        <a class="btn btn-secondary" th:href="@{/tarefas/fazendo}">Em andamento</a>
        <a class="btn btn-secondary" th:href="@{/tarefas}">Todas as tarefas</a>
    </div>
</body>
</html>
